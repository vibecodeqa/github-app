name = "vibecodeqa-github-app"
main = "src/index.ts"
compatibility_date = "2025-05-01"

routes = [
  { pattern = "api.vibecodeqa.online", custom_domain = true }
]

[vars]
APP_URL = "https://app.vibecodeqa.online"

[[kv_namespaces]]
binding = "REPORTS"
id = "04bc9fc88b654e9e9b1994026eedf178"

# Secrets (set via `wrangler secret put`):
# GITHUB_APP_ID
# GITHUB_APP_PRIVATE_KEY
# GITHUB_WEBHOOK_SECRET
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
